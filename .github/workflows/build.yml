# ============================================================================
# Build & Package GreeterApp as Windows Setup.exe via Inno Setup
# ============================================================================
#
# iscc.exe is pre-installed on windows-latest GitHub runners — no setup needed.
#
# Flow:
#   dotnet publish (win-x64, self-contained, single-file)
#     -> iscc.exe (produces Setup.exe)
#       -> upload to GitHub Release

name: Build Windows Installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: src/GreeterApp/GreeterApp.csproj
  PUBLISH_DIR: ./publish/win-x64

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── .NET Setup ──────────────────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ── Extract version from tag ────────────────────────────────────
      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          if ($ver -notmatch '^\d+\.\d+') { $ver = "0.0.0" }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "Version: $ver"

      # ── Build & Publish ─────────────────────────────────────────────
      - name: Publish GreeterApp
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o ${{ env.PUBLISH_DIR }}

      # ── Build Setup.exe with Inno Setup ─────────────────────────────
      # iscc.exe is pre-installed at this path on windows-latest runners
      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $publishDir = Resolve-Path "${{ env.PUBLISH_DIR }}"

          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion="${{ steps.version.outputs.VERSION }}" `
            /DPublishDir="$publishDir" `
            ./installer/greeter-setup.iss

      # ── Upload build artifact ───────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: GreeterApp-Setup-${{ steps.version.outputs.VERSION }}
          path: ./installer/Output/GreeterApp-Setup-*.exe

      # ── Create GitHub Release ───────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./installer/Output/GreeterApp-Setup-*.exe
          generate_release_notes: true
          draft: true
