# ============================================================================
# Build & Package GreeterApp as Windows Setup.exe via Inno Setup
# ============================================================================
#
# iscc.exe is pre-installed on windows-latest GitHub runners — no setup needed.
#
# Flow:
#   dotnet publish (win-x64, self-contained, single-file)
#     -> signtool sign GreeterApp.exe
#       -> iscc.exe (produces Setup.exe)
#         -> signtool sign Setup.exe
#           -> upload to GitHub Release

name: Build Windows Installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: src/GreeterApp/GreeterApp.csproj
  PUBLISH_DIR: ./publish/win-x64

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── .NET Setup ──────────────────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ── Extract version from tag ────────────────────────────────────
      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          if ($ver -notmatch '^\d+\.\d+') { $ver = "0.0.0" }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "Version: $ver"

      # ── Build & Publish ─────────────────────────────────────────────
      - name: Publish GreeterApp
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o ${{ env.PUBLISH_DIR }}

      # ── Import code-signing certificate ──────────────────────────────
      - name: Import code-signing certificate
        if: env.SIGN_CERT_BASE64 != ''
        shell: pwsh
        env:
          SIGN_CERT_BASE64: ${{ secrets.SIGN_CERT_BASE64 }}
          SIGN_CERT_PASSWORD: ${{ secrets.SIGN_CERT_PASSWORD }}
        run: |
          $pfxBytes = [Convert]::FromBase64String($env:SIGN_CERT_BASE64)
          $pfxPath = Join-Path $env:RUNNER_TEMP "code-signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
          echo "PFX_PATH=$pfxPath" >> $env:GITHUB_ENV

          # Locate signtool.exe from Windows SDK
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          echo "SIGNTOOL=$signtool" >> $env:GITHUB_ENV

      # ── Sign the app exe ────────────────────────────────────────────
      - name: Sign GreeterApp.exe
        if: env.PFX_PATH != ''
        shell: pwsh
        env:
          SIGN_CERT_PASSWORD: ${{ secrets.SIGN_CERT_PASSWORD }}
        run: |
          & $env:SIGNTOOL sign /f $env:PFX_PATH /p $env:SIGN_CERT_PASSWORD `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            /d "GreeterApp" `
            "${{ env.PUBLISH_DIR }}\GreeterApp.exe"

      # ── Build Setup.exe with Inno Setup ─────────────────────────────
      # iscc.exe is pre-installed at this path on windows-latest runners
      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $publishDir = Resolve-Path "${{ env.PUBLISH_DIR }}"

          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion="${{ steps.version.outputs.VERSION }}" `
            /DPublishDir="$publishDir" `
            ./installer/greeter-setup.iss

      # ── Sign the installer exe ──────────────────────────────────────
      - name: Sign Setup.exe
        if: env.PFX_PATH != ''
        shell: pwsh
        env:
          SIGN_CERT_PASSWORD: ${{ secrets.SIGN_CERT_PASSWORD }}
        run: |
          $installer = Get-ChildItem "./installer/Output/GreeterApp-Setup-*.exe" |
            Select-Object -First 1 -ExpandProperty FullName
          & $env:SIGNTOOL sign /f $env:PFX_PATH /p $env:SIGN_CERT_PASSWORD `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            /d "GreeterApp Setup" `
            "$installer"

      # ── Clean up certificate ────────────────────────────────────────
      - name: Remove PFX file
        if: always() && env.PFX_PATH != ''
        shell: pwsh
        run: Remove-Item $env:PFX_PATH -Force -ErrorAction SilentlyContinue

      # ── Upload build artifact ───────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: GreeterApp-Setup-${{ steps.version.outputs.VERSION }}
          path: ./installer/Output/GreeterApp-Setup-*.exe

      # ── Create GitHub Release ───────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./installer/Output/GreeterApp-Setup-*.exe
          generate_release_notes: true
          draft: true
